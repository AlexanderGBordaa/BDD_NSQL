<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Mandalorian — Alquiler de Capítulos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gold:       #c9a84c;
      --gold-bright:#f0c060;
      --gold-dim:   #7a5f28;
      --bg:         #080a0e;
      --bg2:        #0d1117;
      --bg3:        #131820;
      --bg4:        #1a2030;
      --text:       #e8dcc8;
      --text-dim:   #8a7f6e;
      --red:        #c0392b;
      --green:      #27ae60;
      --blue:       #2980b9;
      --border:     rgba(201,168,76,0.25);
      --glow:       rgba(201,168,76,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Stars background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 10% 80%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 90%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 45%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  20%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 75% 85%, rgba(255,255,255,.6) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      text-align: center;
      padding: 3rem 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(201,168,76,.05) 0%, transparent 100%);
    }

    .helmet-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: .5rem;
      filter: drop-shadow(0 0 18px var(--gold));
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%,100% { filter: drop-shadow(0 0 18px var(--gold)); }
      50%      { filter: drop-shadow(0 0 34px var(--gold-bright)); }
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      letter-spacing: .15em;
      background: linear-gradient(135deg, var(--gold-dim) 0%, var(--gold-bright) 50%, var(--gold-dim) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }

    header p {
      font-size: 1rem;
      color: var(--text-dim);
      letter-spacing: .2em;
      text-transform: uppercase;
      margin-top: .4rem;
      font-weight: 300;
    }

    .mandalore-line {
      width: 260px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.2rem auto 0;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 1.2rem 1rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .legend-item {
      display: flex; align-items: center; gap: .5rem;
      font-size: .85rem;
      letter-spacing: .05em;
      color: var(--text-dim);
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-available { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-reserved  { background: #f39c12;       box-shadow: 0 0 6px #f39c12; }
    .dot-rented    { background: var(--red);    box-shadow: 0 0 6px var(--red); }

    /* ── Season tabs ── */
    .tabs {
      display: flex;
      gap: 0;
      justify-content: center;
      padding: 1.5rem 1rem .5rem;
      position: relative;
      z-index: 1;
    }

    .tab-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Cinzel', serif;
      font-size: .8rem;
      letter-spacing: .12em;
      padding: .6rem 1.8rem;
      cursor: pointer;
      transition: all .25s;
      position: relative;
    }
    .tab-btn:first-child { border-radius: 4px 0 0 4px; }
    .tab-btn:last-child  { border-radius: 0 4px 4px 0; }
    .tab-btn + .tab-btn  { border-left: none; }

    .tab-btn:hover,
    .tab-btn.active {
      background: var(--glow);
      color: var(--gold-bright);
      border-color: var(--gold);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, rgba(201,168,76,.2), rgba(201,168,76,.05));
    }

    /* ── Grid ── */
    main { padding: 1.5rem clamp(1rem, 4vw, 3rem) 3rem; position: relative; z-index: 1; }

    .season-section { display: none; }
    .season-section.active { display: block; }

    .season-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      letter-spacing: .2em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1.2rem;
    }

    /* ── Cards ── */
    .card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      transition: transform .25s, box-shadow .25s, border-color .25s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(201,168,76,.12);
      border-color: rgba(201,168,76,.5);
    }

    /* Status stripe on left edge */
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 6px 0 0 6px;
    }
    .card.available::before { background: var(--green); }
    .card.reserved::before  { background: #f39c12; }
    .card.rented::before    { background: var(--red); }

    .card-header {
      padding: .9rem 1rem .6rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: .5rem;
    }

    .ep-number {
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      letter-spacing: .15em;
      color: var(--gold-dim);
    }

    .ep-title {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
      margin-top: .1rem;
    }

    .status-badge {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: .25rem .6rem;
      border-radius: 3px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-available { background: rgba(39,174,96,.2);  color: #6fe09a; border: 1px solid rgba(39,174,96,.4); }
    .badge-reserved  { background: rgba(243,156,18,.2); color: #fbb940; border: 1px solid rgba(243,156,18,.4); }
    .badge-rented    { background: rgba(192,57,43,.2);  color: #e87060; border: 1px solid rgba(192,57,43,.4); }

    .card-body {
      padding: 0 1rem 1rem 1.2rem;
    }

    .card-meta {
      display: flex;
      gap: 1rem;
      font-size: .8rem;
      color: var(--text-dim);
      margin-bottom: .8rem;
    }

    .card-meta span { display: flex; align-items: center; gap: .3rem; }

    .price-tag {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--gold-bright);
      margin-bottom: .8rem;
    }

    /* Timer bar */
    .timer-wrapper {
      margin-bottom: .8rem;
    }

    .timer-label {
      font-size: .72rem;
      color: var(--text-dim);
      margin-bottom: .3rem;
      letter-spacing: .08em;
    }

    .timer-bar-bg {
      height: 4px;
      background: var(--bg4);
      border-radius: 2px;
      overflow: hidden;
    }

    .timer-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .9s linear;
    }
    .timer-reserved .timer-bar-fill { background: linear-gradient(90deg, #f39c12, #e67e22); }
    .timer-rented   .timer-bar-fill { background: linear-gradient(90deg, var(--blue), #6dd5fa); }

    .timer-count {
      font-size: .72rem;
      text-align: right;
      margin-top: .2rem;
      color: var(--text-dim);
    }

    /* Buttons */
    .btn-group { display: flex; gap: .5rem; flex-wrap: wrap; }

    .btn {
      font-family: 'Rajdhani', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .45rem 1rem;
      border-radius: 3px;
      border: 1px solid;
      cursor: pointer;
      transition: all .2s;
      flex: 1;
      min-width: 100px;
    }

    .btn-rent {
      background: rgba(201,168,76,.1);
      color: var(--gold-bright);
      border-color: var(--gold-dim);
    }
    .btn-rent:hover {
      background: rgba(201,168,76,.25);
      border-color: var(--gold-bright);
    }

    .btn-confirm {
      background: rgba(39,174,96,.1);
      color: #6fe09a;
      border-color: rgba(39,174,96,.4);
    }
    .btn-confirm:hover {
      background: rgba(39,174,96,.25);
    }

    .btn-cancel {
      background: rgba(192,57,43,.1);
      color: #e87060;
      border-color: rgba(192,57,43,.4);
    }
    .btn-cancel:hover {
      background: rgba(192,57,43,.25);
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.8);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(201,168,76,.15);
      animation: modal-in .25s ease;
    }
    @keyframes modal-in { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .modal h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.15rem;
      color: var(--gold-bright);
      margin-bottom: 1.2rem;
      letter-spacing: .1em;
    }

    .modal-info {
      background: var(--bg4);
      border-radius: 4px;
      padding: .8rem 1rem;
      margin-bottom: 1.2rem;
      font-size: .9rem;
      line-height: 1.7;
      color: var(--text-dim);
    }

    .modal-info strong { color: var(--text); }

    .modal-price {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      color: var(--gold-bright);
      text-align: center;
      margin-bottom: 1.4rem;
    }

    .modal-actions { display: flex; gap: .8rem; }

    .modal-actions .btn { font-size: .85rem; padding: .55rem 1.2rem; }

    /* ── Toast ── */
    #toast-container {
      position: fixed;
      bottom: 2rem; right: 2rem;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: .7rem;
    }

    .toast {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: .8rem 1.2rem;
      font-size: .9rem;
      color: var(--text);
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
      animation: toast-in .3s ease;
      min-width: 260px;
      max-width: 360px;
    }
    @keyframes toast-in { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .toast.success { border-color: rgba(39,174,96,.5); }
    .toast.error   { border-color: rgba(192,57,43,.5); }
    .toast.info    { border-color: rgba(201,168,76,.5); }

    .toast-title {
      font-family: 'Cinzel', serif;
      font-size: .75rem;
      letter-spacing: .1em;
      margin-bottom: .2rem;
    }
    .toast.success .toast-title { color: #6fe09a; }
    .toast.error   .toast-title { color: #e87060; }
    .toast.info    .toast-title { color: var(--gold-bright); }

    /* ── Loader ── */
    .loader {
      text-align: center;
      padding: 4rem 2rem;
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      letter-spacing: .2em;
      color: var(--gold-dim);
    }

    .loader::after {
      content: '';
      display: block;
      width: 40px; height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      margin: 1rem auto 0;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── This is the Way banner ── */
    .way-banner {
      text-align: center;
      padding: .6rem;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,.08), transparent);
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      letter-spacing: .3em;
      color: var(--gold-dim);
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }
  </style>
</head>
<body>

<header>
  <span class="helmet-icon">🪖</span>
  <h1>THE MANDALORIAN</h1>
  <p>Sistema de Alquiler de Capítulos</p>
  <div class="mandalore-line"></div>
</header>

<div class="legend">
  <div class="legend-item"><div class="dot dot-available"></div> Disponible</div>
  <div class="legend-item"><div class="dot dot-reserved"></div> Reservado (4 min)</div>
  <div class="legend-item"><div class="dot dot-rented"></div> Alquilado (24 hs)</div>
</div>

<div class="tabs" id="tabs">
  <button class="tab-btn active" data-season="1">Temporada 1</button>
  <button class="tab-btn"        data-season="2">Temporada 2</button>
  <button class="tab-btn"        data-season="3">Temporada 3</button>
</div>

<main id="main">
  <div class="loader">CARGANDO CAPÍTULOS</div>
</main>

<!-- Modal confirmación de pago -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>⚔ Confirmar Alquiler</h2>
    <div class="modal-info" id="modal-info"></div>
    <div class="modal-price" id="modal-price"></div>
    <div class="modal-actions">
      <button class="btn btn-confirm" id="modal-confirm-btn">Confirmar Pago</button>
      <button class="btn btn-cancel"  id="modal-cancel-btn">Cancelar</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
  const API = 'http://localhost:3000';
  let chapters = [];
  let activeTab = 1;
  let timers = {}; // per-card countdown intervals
  let modalChapterId = null;

  // ── Fetch all chapters ────────────────────────────
  async function loadChapters() {
    try {
      const res = await fetch(`${API}/chapters`);
      const data = await res.json();
      chapters = data.chapters;
      render();
    } catch(e) {
      document.getElementById('main').innerHTML =
        `<div class="loader" style="color:#e87060">⚠ No se pudo conectar con el servidor.<br><small style="font-family:Rajdhani;font-size:.85rem;letter-spacing:.05em">Asegúrese de que el backend esté corriendo en puerto 3000.</small></div>`;
    }
  }

  // ── Render ────────────────────────────────────────
  function render() {
    // Clear old timers
    Object.values(timers).forEach(clearInterval);
    timers = {};

    const main = document.getElementById('main');
    const seasons = [1, 2, 3];
    main.innerHTML = seasons.map(s => {
      const eps = chapters.filter(c => c.season === s);
      return `
        <div class="season-section${s === activeTab ? ' active' : ''}" data-season="${s}">
          <div class="season-title">Temporada ${s} — ${eps.length} Capítulos</div>
          <div class="grid">
            ${eps.map(card).join('')}
          </div>
        </div>`;
    }).join('');

    // Start countdown timers for each reserved/rented card
    chapters.forEach(ch => {
      if (ch.status === 'reserved' && ch.reservationExpiresIn > 0) {
        startTimer(ch.id, ch.reservationExpiresIn, 4*60*1000, 'reserved');
      }
      if (ch.status === 'rented' && ch.rentalExpiresIn > 0) {
        startTimer(ch.id, ch.rentalExpiresIn, 24*60*60*1000, 'rented');
      }
    });
  }

  function card(ch) {
    const statusLabel = { available: 'Disponible', reserved: 'Reservado', rented: 'Alquilado' };
    const badgeClass  = { available: 'badge-available', reserved: 'badge-reserved', rented: 'badge-rented' };

    let timerHtml = '';
    if (ch.status === 'reserved') {
      const pct = ((ch.reservationExpiresIn / (4*60*1000)) * 100).toFixed(1);
      timerHtml = `
        <div class="timer-wrapper timer-reserved" id="timer-wrap-${ch.id}">
          <div class="timer-label">⏳ Tiempo para confirmar pago</div>
          <div class="timer-bar-bg"><div class="timer-bar-fill" id="tbar-${ch.id}" style="width:${pct}%"></div></div>
          <div class="timer-count" id="tcount-${ch.id}">${fmtMs(ch.reservationExpiresIn)}</div>
        </div>`;
    }
    if (ch.status === 'rented') {
      const pct = ((ch.rentalExpiresIn / (24*60*60*1000)) * 100).toFixed(2);
      timerHtml = `
        <div class="timer-wrapper timer-rented" id="timer-wrap-${ch.id}">
          <div class="timer-label">🎬 Alquiler activo</div>
          <div class="timer-bar-bg"><div class="timer-bar-fill" id="tbar-${ch.id}" style="width:${pct}%"></div></div>
          <div class="timer-count" id="tcount-${ch.id}">${fmtMs(ch.rentalExpiresIn)}</div>
        </div>`;
    }

    let buttons = '';
    if (ch.status === 'available') {
      buttons = `<button class="btn btn-rent" onclick="rentChapter(${ch.id})">Alquilar</button>`;
    } else if (ch.status === 'reserved') {
      buttons = `
        <button class="btn btn-confirm" onclick="openModal(${ch.id})">Confirmar Pago</button>
        <button class="btn btn-cancel"  onclick="cancelRent(${ch.id})">Cancelar</button>`;
    } else {
      buttons = `<button class="btn" disabled>Alquilado</button>`;
    }

    return `
      <div class="card ${ch.status}" id="card-${ch.id}">
        <div class="card-header">
          <div>
            <div class="ep-number">T${ch.season} · EP${ch.episode}</div>
            <div class="ep-title">${ch.title}</div>
          </div>
          <span class="status-badge ${badgeClass[ch.status]}">${statusLabel[ch.status]}</span>
        </div>
        <div class="card-body">
          <div class="card-meta">
            <span>⏱ ${ch.duration} min</span>
            <span>📺 Cap. ${ch.id}</span>
          </div>
          <div class="price-tag">$ ${ch.price.toFixed(2)} USD</div>
          ${timerHtml}
          <div class="btn-group">${buttons}</div>
        </div>
      </div>`;
  }

  function fmtMs(ms) {
    const total = Math.ceil(ms / 1000);
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  // ── Countdown timers ──────────────────────────────
  function startTimer(id, remaining, total, type) {
    let left = remaining;
    const interval = setInterval(() => {
      left -= 1000;
      if (left <= 0) {
        clearInterval(interval);
        loadChapters(); // refresh
        return;
      }
      const pct = ((left / total) * 100).toFixed(2);
      const bar   = document.getElementById(`tbar-${id}`);
      const count = document.getElementById(`tcount-${id}`);
      if (bar)   bar.style.width   = pct + '%';
      if (count) count.textContent = fmtMs(left);
    }, 1000);
    timers[id] = interval;
  }

  // ── Rent a chapter ────────────────────────────────
  async function rentChapter(id) {
    const ch = chapters.find(c => c.id === id);
    try {
      const res  = await fetch(`${API}/chapters/${id}/rent`, { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        toast('success', 'RESERVADO', `"${ch.title}" reservado. Tienes 4 min para confirmar.`);
        await loadChapters();
        openModal(id);
      } else {
        toast('error', 'ERROR', data.message);
      }
    } catch(e) {
      toast('error', 'ERROR', 'No se pudo conectar con el servidor.');
    }
  }

  // ── Cancel reservation ────────────────────────────
  async function cancelRent(id) {
    const ch = chapters.find(c => c.id === id);
    try {
      const res  = await fetch(`${API}/chapters/${id}/cancel`, { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        toast('info', 'CANCELADO', `Reserva de "${ch.title}" cancelada.`);
        await loadChapters();
      } else {
        toast('error', 'ERROR', data.message);
      }
    } catch(e) {
      toast('error', 'ERROR', 'No se pudo conectar con el servidor.');
    }
  }

  // ── Modal ─────────────────────────────────────────
  function openModal(id) {
    const ch = chapters.find(c => c.id === id);
    if (!ch || ch.status !== 'reserved') return;
    modalChapterId = id;
    document.getElementById('modal-info').innerHTML = `
      <strong>Capítulo:</strong> ${ch.title}<br>
      <strong>Temporada:</strong> ${ch.season} — Episodio ${ch.episode}<br>
      <strong>Duración:</strong> ${ch.duration} minutos<br><br>
      El alquiler dura <strong>24 horas</strong> desde la confirmación.`;
    document.getElementById('modal-price').textContent = `$ ${ch.price.toFixed(2)} USD`;
    document.getElementById('modal').classList.add('open');
  }

  document.getElementById('modal-cancel-btn').addEventListener('click', () => {
    document.getElementById('modal').classList.remove('open');
    modalChapterId = null;
  });

  document.getElementById('modal-confirm-btn').addEventListener('click', async () => {
    if (!modalChapterId) return;
    const id = modalChapterId;
    const ch = chapters.find(c => c.id === id);
    document.getElementById('modal').classList.remove('open');
    modalChapterId = null;

    try {
      const res  = await fetch(`${API}/chapters/${id}/confirm`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ price: ch.price }),
      });
      const data = await res.json();
      if (data.ok) {
        toast('success', 'PAGO CONFIRMADO', `"${ch.title}" disponible por 24 horas. ¡This is the Way!`);
        await loadChapters();
      } else {
        toast('error', 'ERROR', data.message);
      }
    } catch(e) {
      toast('error', 'ERROR', 'No se pudo conectar con el servidor.');
    }
  });

  // Close modal clicking outside
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) {
      document.getElementById('modal').classList.remove('open');
      modalChapterId = null;
    }
  });

  // ── Tabs ──────────────────────────────────────────
  document.getElementById('tabs').addEventListener('click', e => {
    if (!e.target.matches('.tab-btn')) return;
    activeTab = parseInt(e.target.dataset.season);
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    document.querySelectorAll('.season-section').forEach(s => {
      s.classList.toggle('active', parseInt(s.dataset.season) === activeTab);
    });
  });

  // ── Toast ─────────────────────────────────────────
  function toast(type, title, msg) {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<div class="toast-title">${title}</div>${msg}`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  // ── Init ──────────────────────────────────────────
  loadChapters();
  // Auto-refresh every 30s
  setInterval(loadChapters, 30000);
</script>
</body>
</html>
