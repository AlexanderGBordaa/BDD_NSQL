version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: turismo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - turismo_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: turismo_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - turismo_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: turismo_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - turismo_net

volumes:
  redis_data:

networks:
  turismo_net:
    driver: bridge
